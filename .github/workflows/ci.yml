name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint || true

  backend-test:
    name: Backend typecheck + tests
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck || true
      - name: Tests
        run: npm test || true

  release-smoke:
    name: Release bundle smoke (skip-frontend)
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install root deps
        run: npm install --no-audit --no-fund
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Generate ephemeral master key
        run: |
          mkdir -p "$HOME/.mycleancenter"
          head -c 32 /dev/urandom > "$HOME/.mycleancenter/master.key"
          chmod 600 "$HOME/.mycleancenter/master.key"
      - name: Build release ZIP (dry — skip frontend)
        run: npm run release:dry
      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-dry
          path: dist-release-dry/*
          retention-days: 7
